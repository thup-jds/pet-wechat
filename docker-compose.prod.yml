services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pet
      POSTGRES_PASSWORD: pet123
      POSTGRES_DB: pet_wechat
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pet -d pet_wechat"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    ports:
      - "9527:9527"
    environment:
      DATABASE_URL: postgresql://pet:pet123@postgres:5432/pet_wechat
      PORT: "9527"
      WX_APPID: ${WX_APPID}
      WX_SECRET: ${WX_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:

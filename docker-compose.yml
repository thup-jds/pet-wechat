services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pet
      POSTGRES_PASSWORD: pet123
      POSTGRES_DB: pet_wechat
    volumes:
      - pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address :9001
    volumes:
      - minio_data:/data

  server:
    image: ghcr.io/thup-jds/pet-wechat/server:latest
    ports:
      - "9527:9527"
    environment:
      DATABASE_URL: postgres://pet:pet123@postgres:5432/pet_wechat
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: pet-wechat
      # TODO: 生产环境需替换为安全的密钥
      JWT_SECRET: yehey-dev-secret-change-in-prod
      ADMIN_KEY: yehey-admin-dev
    depends_on:
      - postgres
      - minio

  admin:
    image: ghcr.io/thup-jds/pet-wechat/admin:latest
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pg_data:
  minio_data:

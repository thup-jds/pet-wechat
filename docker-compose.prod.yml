services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pet
      POSTGRES_PASSWORD: pet123
      POSTGRES_DB: pet_wechat
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pet -d pet_wechat"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: ghcr.io/thup-jds/pet-wechat/server:latest
    restart: unless-stopped
    ports:
      - "9527:9527"
    environment:
      DATABASE_URL: postgresql://pet:pet123@postgres:5432/pet_wechat
      PORT: "9527"
      WX_APPID: ${WX_APPID}
      WX_SECRET: ${WX_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: pet-uploads
      S3_PUBLIC_URL: https://pet-wechat.yangl.com.cn/storage
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  admin:
    image: ghcr.io/thup-jds/pet-wechat/admin:latest
    restart: unless-stopped
    ports:
      - "9528:80"

volumes:
  pg_data:
  minio_data:
